name: Sync Backlog to GitHub Issues

on:
  push:
    branches: ['**']
    tags: ['**']
  schedule:
    # Daily full sync at 02:00 UTC to catch any tasks missed by push trigger
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual sync (optional)'
        required: false
        default: 'Manual full sync'

# Only one sync run at a time — prevents race-condition duplicates
concurrency:
  group: sync-backlog-issues
  cancel-in-progress: false   # queue rather than cancel so no tasks are missed

permissions:
  issues: write
  contents: write   # needed to write github_issue field back to task files

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch full history so git rev-parse works; also allows push-back
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed task files (incremental mode)
        id: changed
        if: github.event_name == 'push'
        run: |
          # Get task files touched in this push (between before..after SHAs)
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          # If before is all-zeros this is the first push to a new branch — fall back to full sync
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed_files=" >> "$GITHUB_OUTPUT"
          else
            FILES=$(git diff --name-only "$BEFORE" "$AFTER" -- 'backlog/tasks/task-*.md' 2>/dev/null || true)
            # Output as newline-separated, URL-encoded for env var safety
            echo "changed_files<<EOF" >> "$GITHUB_OUTPUT"
            echo "$FILES" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync backlog tasks to GitHub Issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          # INCREMENTAL=true on push so the script knows to limit scope even when
          # CHANGED_FILES is empty (no task files in this push — only sync unsynced tasks).
          # Schedule/manual runs leave INCREMENTAL unset → full sync.
          INCREMENTAL: ${{ github.event_name == 'push' && 'true' || 'false' }}
          CHANGED_FILES: ${{ steps.changed.outputs.changed_files }}
        run: |
          chmod +x scripts/sync-backlog-issues.sh
          scripts/sync-backlog-issues.sh

      - name: Commit updated task frontmatter (github_issue fields)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No frontmatter changes to commit."
          else
            git add backlog/tasks/
            git commit -m "chore: sync github_issue numbers into task frontmatter [skip ci]"
            # Pull rebase in case another run pushed while we were syncing
            git pull --rebase origin "${GITHUB_REF_NAME}" || git rebase --abort
            git push
          fi
