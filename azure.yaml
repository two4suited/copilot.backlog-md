name: sessionize

# Aspire publish configuration for Azure Container Apps deployment.
# Run `aspire deploy` from the repository root to provision Azure resources
# (Container Apps environment, ACR, PostgreSQL Flexible Server, Key Vault)
# and deploy all containers in one step.

services:
  app:
    language: dotnet
    project: ./Sessionize.AppHost/Sessionize.AppHost.csproj
    host: containerapp
